<!DOCTYPE html>
<html lang = "pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Calculadora</title>
        <link rel="stylesheet" href="css/questao01.css">
    </head>
    <body>
        <div class="container">
        <h1 id="título">Calculadora de Média</h1>
        <legend>Nome:</legend>
        <input type="text" id = "nome" placeholder=" Digite seu nome...">
        <br><br>
        <legend>Nota 1:</legend>
        <input type="number" id = "nota1" placeholder=" Digite sua primeira nota" max="10">
        <br><br>
        <legend>Nota 2:</legend>
        <input type="number" id = "nota2" placeholder=" Digite sua segunda nota" max="10">
        <br><br>
        <legend>Nota 3:</legend>
        <input type="number" id = "nota3" placeholder=" Digite sua terceira nota" max="10">
        <br><br>
        <button type = "button" onclick= "calcularMedia()">Calcular</button>
        <div id="resposta"></div>
        </div>
        <script src="js/questao01.js"></script>
</body>
</html>
